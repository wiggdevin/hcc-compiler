app = "hcc-compiler-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # The Dockerfile lives next to this fly.toml. Build context MUST be the
  # repo root so COPY pyproject.toml / src/ / library/ / services/ resolve.
  # Deploy from repo root:
  #   fly deploy --config services/compiler-api/fly.toml --dockerfile services/compiler-api/Dockerfile

[[mounts]]
  source = "library_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines = 2

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 120

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[vm]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  # LIBRARY_DB_PATH defaults to /data/library.db (volume mount).
  # entrypoint.sh seeds it from /data-seed/library.db on container start
  # when the baked seed is newer than the volume copy, so each fly deploy
  # propagates library changes without manual volume surgery.
  HCC_LIBRARY_ROOT = "/app/library"
  PORT = "8080"
  LOG_LEVEL = "INFO"
  EMBED_BACKEND = "fastembed"
