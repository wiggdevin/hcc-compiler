id: EA-NUT-8010
domain: nutrition
claim: Time-restricted eating does not adversely affect health-related quality of
  life in adults, with improvements observed primarily at 12 weeks/3 months across
  multiple populations.
evidence_level: L1
citations:
- id: 10.1093/nutrit/nuae044
  locator_quote: No studies reported that TRE adversely affected HR-QoL. Improvements
    in HR-QoL appeared to occur primarily at 12 weeks/3 months.
  existence: VERIFIED
  faithfulness: UNSUPPORTED
  cited_title: 'The impact of time-restricted eating on health-related quality of
    life: a systematic literature review'
population_applicability:
  age: Adults (includes middle-aged, older adults, and generally healthy adults)
  sex: Male and female
  training_status: Mixed (sedentary to generally healthy; includes shift workers and
    employees)
  dose_magnitude: Time-restricted eating protocol (specific eating window duration
    varies across studies)
  duration: Improvements primarily observed at 12 weeks/3 months
effect: TRE does not adversely affect health-related quality of life; four studies
  reported improvements in overall HR-QoL scores and three reported significant or
  nonsignificant improvements in some HR-QoL domains across diverse adult populations.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2026-05-28'
expiry: '2028-05-28'
