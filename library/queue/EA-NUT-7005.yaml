id: EA-NUT-7005
domain: nutrition
claim: Ingestion of 45 g protein (casein or whey) prior to sleep increases both mitochondrial
  and myofibrillar protein synthesis rates during overnight recovery from endurance
  exercise compared with placebo, with no significant difference between casein and
  whey.
evidence_level: L2
citations:
- id: 10.1007/s40279-023-01822-3
  locator_quote: Protein ingestion prior to sleep increases both mitochondrial and
    myofibrillar protein synthesis rates during overnight recovery from exercise.
    The overnight muscle protein synthetic response to whey and casein protein does
    not differ.
  existence: VERIFIED
  faithfulness: UNSUPPORTED
  cited_title: 'Pre-sleep Protein Ingestion Increases Mitochondrial Protein Synthesis
    Rates During Overnight Recovery from Endurance Exercise: A Randomized Controlled
    Trial'
population_applicability:
  age: healthy young men
  sex: male
  training_status: recreationally active; performed standardized evening endurance-type
    exercise
  dose_magnitude: 45 g casein or 45 g whey protein ~30 min before sleep
  duration: single overnight recovery period (~8 h post-exercise)
effect: "Pooled pre-sleep protein elevated mitochondrial protein synthesis rates vs.\
  \ placebo (0.087 \xB1 0.020 vs 0.067 \xB1 0.016 %\xB7h\u207B\xB9; p = 0.005) and\
  \ myofibrillar rates (0.060 \xB1 0.014 vs 0.047 \xB1 0.011 %\xB7h\u207B\xB9; p =\
  \ 0.012); casein and whey did not differ for mitochondrial (p = 0.690) or myofibrillar\
  \ (p = 0.440) fractions."
contraindications: []
tier: high-impact
approval: auto
library_version: 0.1.0
last_reviewed: '2026-05-28'
expiry: '2031-05-28'
