id: EA-NUT-5196
domain: nutrition
claim: "Modified alternate-day fasting is the most effective intermittent fasting\
  \ intervention for reducing body weight compared to usual diet, with a mean difference\
  \ of \u22125.18 kg (95% CI: \u22127.04, \u22123.32), supported by high certainty\
  \ of evidence from a network meta-analysis of 56 studies."
evidence_level: L1
