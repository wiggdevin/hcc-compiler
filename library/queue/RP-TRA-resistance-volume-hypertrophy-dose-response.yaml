id: RP-TRA-resistance-volume-hypertrophy-dose-response
domain: training
pattern: "Prescribe progressive resistance training volume in the range of 10\u2013\
  20 weekly sets per muscle group to maximize hypertrophy, recognizing a graded dose-response\
  \ (~0.37% gain per additional set) with diminishing returns at higher volumes, and\
  \ complement with aerobic or multicomponent elements to further enhance functional\
  \ and metabolic outcomes."
parameterization: "Older adults with sarcopenia: start low volume (\u22652 sessions/week,\
  \ ~49% 1RM, 3\xD7/week for \u226519 weeks with 15 exercises, 6 sets, ~16 reps) and\
  \ add balance/aerobic components for functional gains (TUG, chair-stand); metabolic\
  \ disease (T2D, PCOS, CAD): use concurrent aerobic+resistance programming; untrained\
  \ individuals: traditional progressive overload\u2014advanced methods confer no\
  \ added benefit; advanced athletes: higher volumes tolerated but with pronounced\
  \ diminishing returns; patellofemoral pain: favor higher volume over lower volume;\
  \ older adults targeting grip strength specifically: multicomponent or resistance-only\
  \ at prescribed dose."
