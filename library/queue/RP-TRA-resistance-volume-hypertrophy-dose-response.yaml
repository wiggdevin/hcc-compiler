falsification_signal: "A well-powered RCT (n \u2265 200, \u226512 weeks) demonstrating\
  \ no statistically significant dose-response between weekly set volume (5\u2013\
  25 sets/muscle group) and muscle hypertrophy in trained adults, or showing that\
  \ a fixed low-volume protocol produces equivalent hypertrophy to progressively higher\
  \ volumes across the full dose range."
safety_bounds: "Do not exceed 25\u201330 weekly sets per muscle group without experienced\
  \ coach supervision; cap novice single-session volume at \u22646 sets per exercise;\
  \ limit intensity to \u226480% 1RM in unsupervised older adults or those with cardiovascular\
  \ comorbidities; require clinical clearance and supervised initiation for individuals\
  \ with CAD, COPD, congenital heart disease, or sickle cell disease before commencing\
  \ high-intensity or high-volume protocols."
applies_because: "A graded dose-response links weekly resistance-training set volume\
  \ to muscle hypertrophy (ES increment \u22480.023 per set; higher vs. lower volume\
  \ grouping ES difference = 0.241), mediated by cumulative mechanical tension and\
  \ metabolic stress that upregulate muscle protein synthesis proportionally to training\
  \ stimulus up to the individual's recoverable threshold."
doesnt_apply_if: "Acute musculoskeletal injury precluding loaded movement; children\
  \ with cerebral palsy (volume-driven hypertrophy does not translate to fascicle\
  \ length gains); individuals in acute cancer treatment phases with severely limited\
  \ volume tolerance; severe sarcopenic obesity where multicomponent-first programming\
  \ takes precedence; patients in the first 6\u20138 weeks of Nordic hamstring programs\
  \ where volume variables do not predict strength gains."
