id: RP-SUP-creatine-resistance-body-composition
domain: supplements
pattern: "Supplement with creatine monohydrate at 3\u20135 g/day maintenance dose\
  \ (optionally preceded by a 5\u20137-day, 20 g/day loading phase split across 4\
  \ servings) alongside structured resistance training to meaningfully increase fat-free\
  \ mass, muscular strength, and power output compared to resistance training alone."
parameterization: "Postmenopausal women: \u22655 g/day required to elicit lean mass\
  \ gains (+0.37 kg) and lower-body strength (+7.5 kg leg-press 1RM); untrained individuals:\
  \ expect larger absolute strength gains than trained athletes, who show greater\
  \ absolute FFM gains (1.82 kg vs 1.23 kg); active females: performance responses\
  \ are inconsistent and clients should set conservative expectations; combat sport\
  \ and swimming athletes: use for sport-specific power and ergogenic outcomes; co-supplementation\
  \ with \u03B2-alanine (divided 4\u20136.4 g/day) may further enhance repeated high-intensity\
  \ bout performance without adding to maximal strength beyond creatine alone."
