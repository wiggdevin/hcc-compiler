falsification_signal: "A large-scale, adequately powered RCT (n > 200, \u226512-week\
  \ duration) in mixed-sex, mixed-training-status adults demonstrating no statistically\
  \ significant or clinically meaningful difference in fat-free mass or 1RM strength\
  \ gains between creatine monohydrate plus resistance training and placebo plus resistance\
  \ training would disprove this pattern."
safety_bounds: "Loading phase ceiling: 20 g/day for \u22647 days in 4 divided doses;\
  \ maintenance ceiling: 5 g/day for healthy adults; expect a transient, clinically\
  \ non-significant serum creatinine rise (~0.07 \xB5mol/L) with no meaningful GFR\
  \ change in healthy kidneys; clinical supervision and eGFR monitoring required if\
  \ baseline eGFR < 60 mL/min/1.73 m\xB2; do not use loading phase without medical\
  \ clearance in individuals with hypertension or fluid-sensitive conditions."
applies_because: "Creatine supplementation saturates intramuscular phosphocreatine\
  \ stores, accelerating ATP resynthesis during repeated high-intensity bouts and\
  \ enabling higher training volumes, thereby amplifying the anabolic stimulus of\
  \ resistance training and producing consistent meta-analytic gains in fat-free mass\
  \ (+0.82\u20131.39 kg) and strength across diverse populations."
doesnt_apply_if: "Chronic kidney disease (eGFR < 60 mL/min/1.73 m\xB2); known or suspected\
  \ creatine non-responders (low baseline intramuscular creatine, estimated ~25\u2013\
  30% of users); individuals not engaged in structured resistance or high-intensity\
  \ training; active females seeking acute performance improvements should be counselled\
  \ on the currently inconsistent evidence base."
