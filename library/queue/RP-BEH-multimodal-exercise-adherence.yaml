id: RP-BEH-multimodal-exercise-adherence
domain: behavioral
pattern: Deploy a multimodal adherence strategy—combining personalized exercise programming,
  multidimensional social support, self-efficacy enhancement, participant education,
  monitoring and feedback, and technology-assisted engagement—to sustainably increase
  exercise adherence in older adults and individuals with chronic conditions.
parameterization: 'For older adults (65+): weight social support and AI/robot-assisted
  engagement more heavily and extend program durations. For type 2 diabetes: prioritize
  therapeutic education components targeting HbA1c and waist circumference alongside
  physical activity. For chronic pain populations: integrate high-value physiotherapy
  with technology-based tools (apps, wearables) to reduce barriers and sustain adherence.
  Autonomy-supportive and flexible scheduling applies across all subgroups.'
backing_atom_ids:
- EA-BEH-3146
- EA-BEH-4153
- EA-BEH-4318
- EA-BEH-6984
- EA-BEH-9242
falsification_signal: A well-powered RCT (n ≥ 300, ≥ 12-month follow-up) demonstrating
  that a multimodal adherence strategy produces no statistically or clinically meaningful
  improvement in exercise adherence rates compared to a single-component or no-intervention
  control across any of these target populations.
safety_bounds: Exercise intensity and volume must be prescribed within individually
  assessed functional and medical limits; technology or robot-mediated sessions must
  not substitute for qualified clinical oversight in high-risk individuals (e.g.,
  recent cardiac event, severe frailty, unstable diabetes); self-management education
  components must not delay or replace pharmacological management when clinically
  indicated.
applies_because: Convergent evidence across the COM-B behavioral model, therapeutic
  education frameworks, and technology-assisted engagement studies identifies consistent
  modifiable determinants—capability, opportunity, and motivation—whose simultaneous
  targeting produces additive improvements in adherence outcomes including HbA1c,
  engagement duration, and self-reported activity levels.
doesnt_apply_if: Individual is acutely ill or medically unstable; has a contraindication
  to exercise as determined by a licensed clinician; lacks cognitive capacity to engage
  with education or feedback components without supported decision-making; or resides
  in a setting where environmental and social support infrastructure cannot be meaningfully
  established.
tier: routine
approval: auto
version: 0.1.0
