id: RP-CON-hiit-vo2max-broad-population
domain: conditioning
pattern: Prescribe high-intensity interval training (HIIT) as the primary modality
  to improve aerobic capacity (VO2 max/peak) across healthy athletes, youth, and clinical
  populations, as it consistently outperforms moderate-intensity continuous training
  and generic training in producing cardiorespiratory adaptations.
parameterization: "Healthy endurance athletes: standard normoxic HIIT; add hypoxic\
  \ stimulus (live-high-train-low or hypoxic intervals) for an incremental VO2max\
  \ gain of ~SMD 0.26 over normoxic HIIT alone. Racket-sport and team-sport athletes:\
  \ HIIT or small-sided games (SSG) are interchangeable for VO2max; HIIT favored when\
  \ sprint and power outcomes are co-primary. Youth athletes: apply age-appropriate\
  \ volume scaling; effect sizes are large (g \u2248 0.97) so moderate session counts\
  \ (2\u20133\xD7/week) suffice. Post-stroke patients: begin at 50\u201360% HRR and\
  \ progress to \u226580% HRR under supervised conditions; target VO2-VT improvements\
  \ first (MD +2.20 mL/kg/min vs. MICT). HFpEF patients: combine HIIT with inspiratory\
  \ muscle training (IMT) for additive VO2 peak benefit (IMT SMD 3.6, HIIT SMD 3.5\
  \ mL/kg\xB7min); reduce session duration and increase rest intervals relative to\
  \ healthy cohorts."
