falsification_signal: "A well-powered (\u2265200 participants) RCT or meta-analysis\
  \ demonstrating that MICT or generic continuous training produces statistically\
  \ equivalent or superior improvements in VO2 max/peak to HIIT across two or more\
  \ distinct population categories (e.g., athletes + clinical) would disprove this\
  \ pattern."
safety_bounds: "Clinical populations require physician clearance before initiating\
  \ HIIT; absolute contraindications include unstable angina, decompensated heart\
  \ failure (NYHA IV), acute arrhythmia, or recent (\u22643 months) cardiovascular\
  \ event. Maximum session intensity should not exceed 90% HRmax without on-site medical\
  \ supervision for cardiac patients. Hypoxic protocols are contraindicated in individuals\
  \ with sickle-cell trait, severe anemia (Hb < 8 g/dL), or symptomatic pulmonary\
  \ hypertension. Youth athletes: cap work intervals at \u226495% HRmax; mandatory\
  \ warm-up \u226510 min."
applies_because: "HIIT drives superior mitochondrial biogenesis, stroke volume augmentation,\
  \ and peripheral oxygen extraction versus lower-intensity modalities by repeatedly\
  \ stressing the oxygen transport chain near its ceiling, as corroborated by consistent\
  \ effect-size advantages (SMD/g 0.37\u20133.6 for VO2-related outcomes) across diverse\
  \ meta-analyses spanning clinical, youth, and performance populations."
doesnt_apply_if: Unstable cardiovascular or pulmonary conditions precluding maximal
  exertion; acute musculoskeletal injury limiting weight-bearing or cyclic movement;
  severe obesity (BMI > 40) without clinical clearance; populations requiring strictly
  low-load protocols (e.g., acute post-surgical rehabilitation within 6 weeks of procedure);
  individuals with severe autonomic neuropathy impairing heart-rate response to exercise.
tier: high-impact
approval: auto
