falsification_signal: Adequately powered RCTs demonstrating no significant difference
  in muscle cross-sectional area or lean-mass outcomes across weekly set-volume strata
  (e.g., 5 vs. 15 vs. 25 sets/muscle/week) after controlling for load intensity, exercise
  selection, and protein intake, or evidence that volume beyond a moderate threshold
  produces equivalent hypertrophy gains without diminishing returns.
safety_bounds: Do not exceed 25 sets per muscle group per week without structured
  deload weeks and overtraining biomarker monitoring; older adults (≥65 years) and
  clinical populations should not exceed 10–12 sets/muscle/week without physiotherapist
  or physician supervision; individuals with acute musculoskeletal injury to the target
  muscle are excluded until medically cleared; cardiac populations (CAD, congenital
  heart disease) require supervised graduated intensity escalation before unsupervised
  high-volume RT.
applies_because: Meta-analytic data confirm a graded dose-response between weekly
  set volume and muscle hypertrophy (ES increment ~0.023 per additional set; ES difference
  ~0.241 between higher- and lower-volume groups), mechanistically underpinned by
  cumulative mechanical tension, metabolic stress, and satellite cell activation that
  collectively upregulate muscle protein synthesis and myofibrillar accretion.
doesnt_apply_if: Acute injury to the target musculature; populations where muscle
  fiber-number change (hyperplasia) rather than hypertrophy is the primary goal, as
  hyperplasia is not supported by evidence in humans (EA-TRA-7564); ambulatory children
  with cerebral palsy where fascicle-length adaptations are absent regardless of modality
  (EA-TRA-0722); sarcopenic obesity in older adults where multicomponent training
  is superior for BMI and body-fat reduction (EA-TRA-0309); or contexts mandating
  caloric restriction or pharmacotherapy without an exercise component as the sole
  intervention.
