id: RP-TRA-volume-dose-hypertrophy
domain: training
pattern: Prescribe resistance training with progressively increasing weekly set volume
  targeting 10–20 sets per muscle group per week to exploit the graded dose-response
  relationship between volume and muscle hypertrophy, while monitoring for diminishing
  returns and adjusting volume downward for older, clinical, or recovery-limited populations.
parameterization: 'Beginners/detrained: start 5–10 sets/muscle/week; intermediate:
  10–15 sets; advanced/hypertrophy-focused: 15–20+ sets with deload monitoring. Older
  adults with sarcopenia: low volume (≤10 sets/week) is sufficient for lean-mass and
  functional gains; moderate-to-high volume needed for lower-limb strength gains (EA-TRA-5023);
  optimal handgrip-strength protocol is 3×/week at ~49% 1RM, 6 sets × 16 reps × 15
  exercises for ~19 weeks (EA-TRA-1711). Clinical populations (cancer, COPD, hemodialysis,
  T2DM): reduce absolute volume, prioritize adherence, and add aerobic component for
  cardiorespiratory/metabolic outcomes (EA-TRA-2215, EA-TRA-5422, EA-TRA-4554). Weight-loss
  contexts: combine RT with lifestyle intervention to limit lean-mass loss to ~17.5%
  of total weight lost vs. ~26–35% with caloric restriction or incretin therapy alone
  (EA-TRA-7354). Sarcopenic obesity: multicomponent training is preferred over pure
  RT for BMI and body-fat reduction (EA-TRA-0309). For older adults requiring functional
  capacity gains, combine RT with aerobic and balance components (EA-TRA-1619, EA-TRA-5271,
  EA-TRA-5420).'
