falsification_signal: A pre-registered RCT (n > 500, ≥12 weeks, matched progressive
  resistance training) demonstrating no significant between-group difference in fat-free
  mass or 1RM strength for creatine versus placebo in resistance-trained adults would
  disprove the core ergogenic claim.
safety_bounds: Loading phase must not exceed 20 g/day for more than 7 days; maintenance
  dose ≤5 g/day for healthy adults; serum creatinine may transiently rise (~0.07 µmol/L)
  without GFR impairment, but individuals with eGFR < 60 mL/min/1.73 m² or a single
  functioning kidney must obtain nephrology clearance before use; no established safe
  upper limit exists for long-term doses above 10 g/day.
applies_because: Exogenous creatine saturates intramuscular phosphocreatine stores,
  accelerating ATP resynthesis during high-intensity contractions, enabling greater
  cumulative training volume and downstream mTOR-mediated anabolic signalling that
  drives hypertrophy and strength gains across training cycles.
doesnt_apply_if: Pre-existing renal impairment (eGFR < 60 mL/min/1.73 m²); active
  females engaged in non-resistance-based exercise programmes where performance benefit
  is inconsistent; athletes seeking anti-inflammatory outcomes (no significant effect
  on CRP, IL-6, IL-1β, TNF-α, or PGE2); primarily endurance-focused athletes for whom
  protein supplementation is the more effective ergogenic modality.
