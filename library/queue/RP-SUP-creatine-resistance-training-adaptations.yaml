id: RP-SUP-creatine-resistance-training-adaptations
domain: supplements
pattern: Supplement with creatine monohydrate (3–5 g/day maintenance, or a 5–7 day
  loading phase of 20 g/day in four divided doses) combined with progressive resistance
  training to increase fat-free mass, upper- and lower-body strength, and high-intensity
  exercise capacity.
parameterization: Untrained individuals exhibit greater relative strength gains than
  trained individuals (though trained athletes accumulate greater absolute fat-free
  mass, ~1.82 kg vs ~1.23 kg); postmenopausal women require ≥5 g/day to achieve meaningful
  lean-mass (+0.37 kg) and leg-press (+7.5 kg 1RM) benefits; active females as a whole
  show inconsistent performance responses and may need higher resistance-training
  volumes to realise ergogenic effects; low-to-moderate doses paired with high-intensity
  exercise outperform high doses alone for strength; co-ingestion with β-alanine extends
  benefit to repeated-bout anaerobic performance without additional maximal-strength
  gains; combat-sport and competitive swimming populations benefit specifically for
  power output and sprint performance.
