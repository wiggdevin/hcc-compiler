falsification_signal: A pre-registered RCT (n ≥ 200, ≥ 12 weeks) in matched healthy
  or stable clinical participants demonstrating that moderate-intensity continuous
  training (MICT) produces equivalent or superior VO2max/peak gains to HIIT at the
  same weekly training volume, with effect size difference < 0.20 SMD.
safety_bounds: HIIT is absolutely contraindicated in unstable angina, decompensated
  heart failure, or uncontrolled arrhythmia; HFpEF and post-stroke protocols require
  physician clearance and on-site clinical supervision for every session; peak session
  intensity must not exceed 95% HRmax without continuous cardiac monitoring; hypoxic
  protocols (FiO2 < 0.15 or altitude > 3000 m equivalent) require SpO2 monitoring
  and abort threshold ≥ 85% SpO2.
applies_because: HIIT repeatedly recruits cardiac output and skeletal muscle oxygen
  extraction to near-maximal levels, producing superior central adaptations (increased
  stroke volume, cardiac remodeling) and peripheral adaptations (mitochondrial biogenesis,
  oxidative enzyme upregulation, capillary density) compared to lower-intensity modalities;
  hypoxic conditions further amplify erythropoietic and ventilatory drive responses.
doesnt_apply_if: Unstable or decompensated cardiovascular disease; acute musculoskeletal
  injury preventing high-intensity effort; severe pulmonary hypertension; uncontrolled
  hypertension (resting SBP > 180 mmHg or DBP > 110 mmHg); active neurological instability
  post-stroke; pediatric populations below Tanner stage II without pediatric sports
  medicine oversight.
