id: RP-CON-hiit-vo2max-multimodal
domain: conditioning
pattern: Prescribe high-intensity interval training (HIIT) as the primary conditioning
  modality to maximize VO2 max/peak gains across healthy athletes and clinical populations,
  with hypoxic augmentation or inspiratory muscle training added when population-specific
  evidence supports a further aerobic ceiling.
parameterization: 'Healthy athletes (racket sports, youth, soccer): standard normoxic
  HIIT; small-sided games are interchangeable for soccer players (VO2max ES non-significant
  vs HIIT). Distance runners or altitude-tolerant athletes: replace normoxic HIIT
  with hypoxic HIIT to gain an additional SMD ~0.68 in VO2max. Post-stroke patients:
  HIIT over MICT (target MD +1.88 mL/kg·min VO2peak, +2.20 mL/kg·min VO2-VT); begin
  at reduced intensity (50–60% HRmax) with supervised titration. HFpEF patients: layer
  inspiratory muscle training (SMD 3.6) as primary modality, with HIIT (SMD 3.5) or
  combined aerobic-resistance (SMD 3.2) as adjuncts under cardiologist supervision.
  Live-high-train-low and repeated-sprint-in-hypoxia protocols (RSH g=0.50, RSA g=0.61)
  suit team-sport athletes seeking combined aerobic and anaerobic gains.'
