falsification_signal: "A pre-registered RCT of \u22653-BCT multicomponent interventions\
  \ versus a single-BCT or no-BCT control fails to detect statistically significant\
  \ between-group differences in objectively measured physical activity volume or\
  \ validated mental-health or sleep-quality scores at 12-week follow-up."
safety_bounds: "BCT-based behavioral programs carry no known pharmacological risk;\
  \ however, prescribed exercise intensity should remain within age-appropriate aerobic\
  \ guidelines (moderate\u2013vigorous, \u226460 min/day for youth per WHO) and must\
  \ not substitute for clinical care in participants with diagnosed psychiatric or\
  \ sleep disorders requiring pharmacological or psychotherapeutic treatment."
applies_because: BCTs target the psychological, social, and environmental determinants
  of behavior simultaneously; multicomponent designs reduce barriers across all three
  levels at once, producing additive or synergistic effects on motivation, habit formation,
  and sustained behavior change that single-component approaches cannot match.
doesnt_apply_if: Individuals with clinically diagnosed psychiatric conditions (e.g.,
  severe MDD, bipolar disorder, psychosis) requiring pharmacological or intensive
  psychotherapeutic management; those with physical contraindications to exercise;
  settings that lack the personnel, technology, or community infrastructure needed
  to operationalize social support or feedback components; populations outside the
  adolescent-to-middle-age range (i.e., children <12 y or older adults >65 y) where
  evidence from these atoms does not directly apply.
tier: routine
approval: auto
