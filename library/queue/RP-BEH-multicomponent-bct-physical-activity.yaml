id: RP-BEH-multicomponent-bct-physical-activity
domain: behavioral
pattern: "Design physical activity and health-behavior interventions as multicomponent\
  \ programs that deliberately stack at least three evidence-based behavior change\
  \ techniques\u2014prioritizing social support, self-monitoring, and feedback\u2014\
  to maximize significant improvements in physical activity, mental health, and related\
  \ outcomes in adolescents and young adults."
parameterization: "Adolescents (12\u201318 y): emphasize Social reward, Behavioral\
  \ contract, and Prompts/cues alongside Social support for greatest effect on physical\
  \ activity adherence; digital delivery of social support is a viable substitute\
  \ when in-person access is limited. University students (18\u201325 y): structured\
  \ physical activity programs alone yield large mental-health gains; pairing with\
  \ self-monitoring apps amplifies wellbeing and depression/anxiety reductions. Middle-aged\
  \ adults (40\u201360 y): add goal-setting and meditation BCTs to the core stack\
  \ to generate co-benefits in sleep quality and cognitive function. Environmental\
  \ or policy components (e.g., activity-friendly spaces, cue redesign) can be layered\
  \ into any age cohort to further reduce sedentary behavior."
backing_atom_ids:
