id: EA-SUP-3952
domain: supplements
claim: Pre-sleep protein supplementation at 0.5 g/kg/day does not reduce blood markers
  of muscle damage or inflammatory cytokines compared to isocaloric carbohydrate in
  trained swimmers completing two weeks of sprint interval training.
evidence_level: L2
citations:
- id: 10.1080/15502783.2023.2244478
  locator_quote: Pre-sleep protein ingestion failed to ameliorate blood markers of
    muscle damage.
  existence: VERIFIED
  faithfulness: UNSUPPORTED
  cited_title: Effects of pre-sleep protein supplementation on plasma markers of muscle
    damage and inflammatory cytokines resulting from sprint interval training in trained
    swimmers
population_applicability:
  age: not specified; competitive swimmer context suggests young adult
  sex: not specified
  training_status: trained swimmers
  dose_magnitude: 0.5 g/kg/day protein beverage pre-sleep vs. isocaloric carbohydrate
  duration: 2 weeks in-water sprint interval training
effect: "No significant between-group differences in CK, IL-6, IL-10, or TNF\u03B1\
  \ at any time point (45 min, 24 h, or 48 h post-SIT); both PRO and CHO groups showed\
  \ equivalent muscle damage responses and a shared anti-inflammatory cytokine shift\
  \ (reduced IL-6:IL-10 ratio) at 48 h following the final training session."
contraindications: []
