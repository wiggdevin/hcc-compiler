id: EA-SUP-0398
domain: supplements
claim: Combining resistance training with amino acid-based supplementation significantly
  improves muscle strength and physical function in older adults with sarcopenia,
  but does not significantly increase muscle mass.
evidence_level: L1
citations:
- id: 10.1186/s12891-025-09436-8
  locator_quote: "Evidence rated as low to very low certainty indicated that, compared\
    \ with resistance training alone, combined amino acid supplementation and resistance\
    \ training significantly improved handgrip strength (SMD\u2009=\u20090.69, 95%\
    \ CI: 0.04 to 1.35), gait speed (SMD\u2009=\u20090.64, 95% CI: 0.02 to 1.25),\
    \ Short Physical Performance Battery scores (SMD\u2009=\u20091.69, 95% CI: 0.81\
    \ to 2.57), and Five Times Sit-to-Stand Test performance (SMD = -1.42, 95% CI:\
    \ -2.68 to -0.16). No significant effects were observed for skeletal muscle mass\
    \ index or appendicular skeletal muscle mass."
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: 'Combined resistance training and amino acid-based supplementation
    for sarcopenia in older adults: a systematic review and meta-analysis'
population_applicability:
  age: older adults
  sex: mixed
  training_status: sarcopenic
  dose_magnitude: varied (essential amino acids, BCAA, leucine, or HMB)
  duration: unspecified
effect: Significant improvements in handgrip strength, gait speed, SPPB scores, and
  sit-to-stand performance; no significant effect on muscle mass.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2025-05-19'
expiry: '2026-05-19'
