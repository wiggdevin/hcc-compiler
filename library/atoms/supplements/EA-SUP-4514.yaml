id: EA-SUP-4514
domain: supplements
claim: HMB supplementation combined with resistance training does not improve fat
  mass, muscle mass, or muscle strength in adults aged 50 years and older compared
  with resistance training alone.
evidence_level: L1
citations:
- id: 10.1093/ageing/afag073
  locator_quote: The combination of HMB supplementation and resistance training does
    not improve body composition or muscle strength in adults aged 50 years and older.
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Efficacy of HMB supplementation as an adjunct to resistance training
    in older adults: a comprehensive meta-analysis'
population_applicability:
  age: 50 years and older
  sex: not specified
  training_status: participants engaged in structured resistance training
  dose_magnitude: HMB supplementation (specific dose not reported in abstract)
  duration: not specified in abstract
effect: "Null effect across all primary outcomes: fat mass SMD = 0.24 (95% CI: \u2212\
  0.01 to 0.49), muscle mass SMD = 0.05 (95% CI: \u22120.10 to 0.20), muscle strength\
  \ SMD = 0.04 (95% CI: \u22120.72 to 0.63); low heterogeneity for body composition,\
  \ high heterogeneity for strength; no publication bias detected (13 RCTs, n = 561)."
