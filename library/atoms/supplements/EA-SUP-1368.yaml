id: EA-SUP-1368
domain: supplements
claim: Creatine supplementation does not consistently improve exercise performance
  in active females, with most studies showing no improvement compared to placebo.
evidence_level: L1
citations:
- id: 10.3390/nu17020238
  locator_quote: Compared to placebo, 3/11 studies showed an improvement in strength/power
    outcomes, 4/17 showed an improvement in anaerobic outcomes, and 1/5 showed an
    improvement in aerobic outcomes. Study quality varied, but methodological considerations
    for research with female athletes were poorly addressed by most studies. Although
    some benefits were reported, most studies showed no improvement in performance
    compared to placebo.
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: Does Creatine Supplementation Enhance Performance in Active Females?
    A Systematic Review
population_applicability:
  age: unspecified
  sex: female
  training_status: active
  dose_magnitude: various
  duration: 5 days to 12 weeks
effect: The majority of included studies (27 total) found no significant improvement
  in strength/power, anaerobic, or aerobic performance outcomes compared to placebo.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2025-05-20'
expiry: '2028-05-20'
