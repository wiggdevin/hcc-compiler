id: EA-SUP-4445
domain: supplements
claim: Whey protein supplementation significantly improves bench press and squat performance
  in young adults engaged in resistance training without significantly altering lean
  body mass.
evidence_level: L1
citations:
- id: 10.1080/19390211.2025.2604679
  locator_quote: 'The analysis found no significant effect of either whey or soy protein
    supplementation on LBM. However, protein supplement increased peak plasma total
    EAA with whey protein significantly improved bench press (mean difference [MD]
    8.87; 95% CI: 5.95-11.79) and squat performance (MD 9.60; 95% CI: 5.61-13.60),
    with low to no heterogeneity.'
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: 'The Impact of Whey and Soy Protein Supplementation on Resistance Training
    in Young Adults: A Systematic Review and Meta-Analysis'
population_applicability:
  age: 18-30 years
  sex: male/female
  training_status: trained or untrained
  dose_magnitude: concentrate or isolate
  duration: unspecified
effect: Whey protein significantly improved bench press (MD 8.87) and squat performance
  (MD 9.60) but did not significantly alter lean body mass.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
