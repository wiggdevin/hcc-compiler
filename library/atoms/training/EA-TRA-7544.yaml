id: EA-TRA-7544
domain: training
claim: Exercise interventions significantly reduce 24-h mean blood glucose, mean amplitude
  of glycemic excursion, peak blood glucose, and incremental area under the glucose
  curve while increasing time in range in non-diabetic populations.
evidence_level: L1
citations:
- id: 10.1111/dom.70368
  locator_quote: Exercise significantly reduced MBG (weighted mean difference [WMD]
    = -0.17 mmol/L), MAGE (WMD = -0.27 mmol/L), MAX (WMD = -0.63 mmol/L), and 4-6-h
    iAUC (standardized mean difference [SMD] = -0.60), while increasing TIR (WMD =
    6.22%), compared to non-exercise or usual activity controls.
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: 'Effects of exercise interventions on 24-h continuous glucose profiles
    in non-diabetic populations: A systematic review and meta-analysis'
population_applicability:
  age: adults (subgroup analysis indicated age influenced outcomes)
  sex: mixed
  training_status: non-diabetic
  dose_magnitude: various exercise interventions
  duration: acute and chronic interventions
effect: Reduction in mean blood glucose, glycemic variability, and peak glucose, alongside
  an increase in time in range.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2025-04-10'
expiry: '2028-04-10'
