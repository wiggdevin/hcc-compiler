id: EA-TRA-2215
domain: training
claim: Concurrent exercise training is effective in improving metabolic markers, body
  composition, lipid profile, inflammation, and cardiorespiratory fitness in people
  with type 2 diabetes.
evidence_level: L1
citations:
- id: 10.1080/09593985.2023.2225717
  locator_quote: The CET is effective in improving metabolic markers, body composition,
    lipid profile, inflammation, and CRF in people with T2DM and can be included in
    the management of T2DM.
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Effectiveness of concurrent exercise training in people with type
    2 diabetes: A systematic review and meta-analysis'
population_applicability:
  age: 35-65 years
  sex: mixed
  training_status: people with type 2 diabetes
  dose_magnitude: at least 2 times/week
  duration: minimum 8 weeks
effect: Significant improvements in glucose level, glycated hemoglobin, insulin resistance,
  body mass index, body fat percentage, fat-free mass, waist circumference, triglycerides,
  peak oxygen uptake, and tumor necrotic factor -α.
contraindications: []
tier: high-impact
approval: human
