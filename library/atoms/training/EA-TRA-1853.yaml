id: EA-TRA-1853
domain: training
claim: Nordic hamstring exercise training significantly improves eccentric and concentric
  strength, but meta-regressions show no association between strength gains and training
  volume variables (duration, frequency, sets, or repetitions) during the first 6-8
  weeks.
evidence_level: L1
citations:
- id: 10.1519/JSC.0000000000005184
