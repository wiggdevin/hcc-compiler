    training volume-related variables (duration, frequency, number of sets or repetitions).
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: 'Dose-Response Relationship for Strength Gains From Nordic Hamstring
    Exercise: A Systematic Review, Meta-Analysis, and Meta-Regression'
population_applicability:
  age: unspecified
  sex: unspecified
  training_status: nonathletes and athletes inexperienced with NHE
  dose_magnitude: '3-103 weekly repetitions (median: 50)'
  duration: '3-39 weeks (median: 6)'
effect: Significant improvements in eccentric NHE strength (ES = 0.98), eccentric
  isokinetic strength (ES = 0.52), and concentric isokinetic strength (ES = 0.42);
  no significant improvement in isometric strength.
