  faithfulness: ACCESS_LIMITED
  cited_title: 'Effects of ACSM guideline-based exercise on patients with lung cancer:
    a systematic review and meta-analysis'
population_applicability:
  age: adults
  sex: male and female
  training_status: lung cancer patients
  dose_magnitude: high adherence to ACSM guidelines
  duration: varies
effect: High-adherence exercise interventions resulted in greater improvements for
  quality of life (SMD = 0.75), fatigue (SMD = -0.77), and pain (SMD = -1.46) compared
  to low-adherence groups.
