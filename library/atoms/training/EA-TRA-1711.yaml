id: EA-TRA-1711
domain: training
claim: The optimal dose of resistance training to improve handgrip strength in older
  adults with sarcopenia is 3 times per week, 49% 1RM, for 19 weeks, featuring 15
  exercises, 6 sets, and 16 repetitions per exercise, totaling up to 1,400 reps weekly.
