domain: training
claim: Interval training combined with blood flow restriction (IT+BFR) significantly
  improves maximal oxygen uptake (VO2max), mean power during the Wingate 30-s test,
  muscle strength, muscle endurance, time to fatigue, and maximal aerobic speed compared
  to interval training alone.
