id: EA-TRA-8790
domain: training
claim: In overweight/obese postmenopausal and older females, high-volume resistance
  training (~77 sets/week) elicits greater improvements in glucose and C-reactive
  protein levels compared to low-volume resistance training (~44 sets/week).
evidence_level: L1
