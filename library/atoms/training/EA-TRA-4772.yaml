id: EA-TRA-4772
domain: training
claim: High-intensity interval training (HIIT) is more effective than moderate-intensity
  continuous training (MICT) for improving athletes' VO2max and anaerobic threshold
  (AT) when applied for short durations (1-3 weeks for AT; 1-9 weeks for VO2max),
  while both modalities yield similar effects on running economy.
evidence_level: L1
citations:
- id: 10.1007/s00421-024-05532-0
  locator_quote: "There was no significant difference between the effects of HIIT\
    \ and MICT on the enhancement of athletes' running economy (RE) (P\u2009>\u2009\
    0.05); 1-3\_weeks and 4-9\_weeks of HIIT were more effective in improving athletes'\
    \ maximum oxygen uptake (VO2max) (P\u2009<\u20090.05), and 10\_weeks and above\
    \ were not significant (P\u2009>\u20090.05); 1-3\_weeks of HIIT was more effective\
    \ in improving athletes' anaerobic threshold (AT) (P\u2009<\u20090.05), and 4-10\_\
    weeks was not significant (P\u2009>\u20090.05)"
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: The effects of high-intensity interval training versus moderate-intensity
    continuous training on athletes' aerobic endurance performance parameters
population_applicability:
  age: unspecified
  sex: unspecified
  training_status: athletes
  dose_magnitude: HIIT vs MICT
  duration: 1-10 weeks
effect: HIIT provides superior improvements in VO2max (1-9 weeks) and AT (1-3 weeks)
  compared to MICT, with no significant difference in running economy enhancement.
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2024-06-23'
expiry: '2029-06-23'
