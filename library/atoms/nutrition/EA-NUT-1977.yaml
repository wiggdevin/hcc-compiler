id: EA-NUT-1977
domain: nutrition
claim: "Restricting feeding to 2\u20133 meals per day and practicing time-restricted\
  \ feeding with less than 10 hours of daily food intake promotes weight loss and\
  \ glycemic control in adults with type 2 diabetes."
evidence_level: L1
citations:
- id: 10.1371/journal.pone.0298531
  locator_quote: Restricting feeding to 2 to 3 meals per day and practicing time restricted
    feeding with less than 10 hours of daily food intake promotes weight loss and
    glycemic control in patients with type 2 diabetes.
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Meal frequency strategies for the management of type 2 diabetes subjects:
    A systematic review'
population_applicability:
  age: adults
  sex: all
  training_status: not specified
  dose_magnitude: "2\u20133 meals/day; <10-hour daily food intake window"
  duration: varies across 13 included studies published within the last 10 years
effect: "Reducing meal frequency to 2\u20133 meals/day combined with a time-restricted\
  \ feeding window of under 10 hours/day is associated with meaningful improvements\
  \ in weight and glycemic control in type 2 diabetes patients; breakfast skipping\
  \ and pre-bedtime snacking were not found to confer equivalent benefits."
contraindications: []
tier: high-impact
