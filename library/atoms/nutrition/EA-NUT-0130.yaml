id: EA-NUT-0130
domain: nutrition
claim: In the context of an energy-reduced diet, distributing total daily energy intake
  with a focus on earlier intake results in significantly greater short-term weight
  loss compared with later intakes.
evidence_level: L1
citations:
- id: 10.1111/obr.13537
  locator_quote: distributing energy intake with a focus on earlier intake resulted
    in significantly greater weight loss (-1.23 kg; 95% CI 2.40, -0.06, p = 0.04)
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Distribution of energy intake across the day and weight loss: A systematic
    review and meta-analysis'
population_applicability:
  age: adults
  sex: not specified
  training_status: not specified
  dose_magnitude: energy-reduced diet
  duration: short-term
effect: "Earlier daily energy distribution yields approximately \u22121.23 kg greater\
  \ weight loss (95% CI \u22122.40 to \u22120.06, p = 0.04) versus later intake patterns,\
  \ with additional improvements in HOMA-IR, fasting glucose, and LDL cholesterol."
contraindications: []
