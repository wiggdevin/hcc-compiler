id: EA-NUT-3103
domain: nutrition
claim: Intermittent fasting and calorie restriction combined with exercise can be
  effectively integrated without negatively impacting most measures of physical performance,
  while significantly enhancing weight loss and adiposity-related outcomes.
evidence_level: L1
citations:
- id: 10.3390/nu17121992
  locator_quote: 'Conclusions: IF (hypocaloric or eucaloric) and CR can be effectively
    integrated into exercise training without negatively impacting most measures of
    physical performance, while significantly enhancing weight loss and adiposity-related
    outcomes.'
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Effects of Intermittent Fasting and Calorie Restriction on Exercise
    Performance: A Systematic Review and Meta-Analysis'
population_applicability:
  age: 18-65
  sex: male and female
  training_status: athletes and non-athletes
  dose_magnitude: hypocaloric or eucaloric IF/CR combined with exercise
  duration: 4-52 weeks
effect: Significant decreases in body weight, BMI, fat mass, and body fat percentage;
  no significant negative impact on VO2max or most strength measures (except handgrip
  strength which increased).
contraindications: []
tier: routine
approval: auto
library_version: 0.1.0
last_reviewed: '2025-04-10'
expiry: '2028-04-10'
