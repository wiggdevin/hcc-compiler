id: EA-NUT-7436
domain: nutrition
claim: The leucine trigger hypothesis is most applicable for regulating the post-prandial
  response of muscle protein synthesis to ingested proteins in older adults and is
  more relevant within the context of ingesting isolated protein sources rather than
  protein-rich whole foods.
evidence_level: L1
citations:
- id: 10.3389/fnut.2021.685165
  locator_quote: However, our data indicate that the leucine trigger hypothesis confers
    most application in regulating the post-prandial response of MPS to ingested proteins
    in older adults. Consistent with our hypothesis, we provide data to support the
    idea that the leucine trigger hypothesis is more relevant within the context of
    ingesting isolated protein sources rather than protein-rich whole foods.
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Evaluating the Leucine Trigger Hypothesis to Explain the Post-prandial
    Regulation of Muscle Protein Synthesis in Young and Older Adults: A Systematic
    Review'
