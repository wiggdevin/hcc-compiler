  locator_quote: This meta-analysis confirms that RSH provides a moderate performance
    advantage over RSN, particularly for repeated-sprint ability.
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: A multilevel meta-analysis of the effects of repeated sprint training
    in hypoxia on athletic performance
population_applicability:
  age: adults
  sex: male and female
  training_status: athletes
  dose_magnitude: moderate hypoxia intensity (FiO2 ~13-14%)
  duration: multi-week training blocks
effect: RSH significantly improved performance outcomes compared with RSN (g = 0.50),
  with stronger effects for RSA (g = 0.61) than aerobic (g = 0.42) or anaerobic (g
  = 0.39) outcomes.
