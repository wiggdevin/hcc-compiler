id: EA-CON-6998
domain: conditioning
claim: "High-intensity interval training (HIIT) is more effective than moderate-intensity\
  \ continuous training (MICT) in improving oxygen consumption at peak (V\u0307O2-peak)\
  \ and at ventilation threshold (VO2-VT) in patients after stroke."
evidence_level: L1
citations:
- id: 10.3389/fneur.2026.1727980
  locator_quote: "The meta-analysis revealed that HIIT was more effective in improving\
    \ V\u0307O2-peak (MD\u202F=\u202F1.88\u202FmL/kg/min, 95% CI: 1.20 to 2.55, p\u202F\
    <\u202F0.05) and VO2-VT (MD\u202F=\u202F2.20\u202FmL/kg/min, 95% CI: 0.46 to 3.95,\
    \ p\u202F<\u202F0.05)."
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Effects of high-intensity interval training versus moderate-intensity
    continuous training on cardiorespiratory function in patients after stroke: a
    systematic review and meta-analysis of randomized trials'
