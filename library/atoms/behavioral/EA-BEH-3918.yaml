id: EA-BEH-3918
domain: behavioral
claim: Behavioral sleep interventions utilizing behavior change techniques (BCTs)
  such as goal setting and meditation are linked to positive outcomes for both sleep
  quality and cognitive function in middle-aged adults.
evidence_level: L1
citations:
- id: 10.1038/s41598-025-24009-4
  locator_quote: BCT categories commonly used were goal setting, shaping knowledge,
    natural consequences, comparison of behaviour, repetition/substitution, comparison
    of outcomes, regulation and antecedents. These BCTs were also linked to positive
    outcomes for cognition and sleep quality.
  existence: UNVERIFIABLE
  faithfulness: ACCESS_LIMITED
  cited_title: 'Effectiveness of behavioural sleep programs for middle-aged adults
    on cognition and sleep and associated behaviour change techniques: a systematic
    review and meta-analysis'
