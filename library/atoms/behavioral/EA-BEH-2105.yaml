id: EA-BEH-2105
domain: behavioral
claim: Behavioral change techniques such as Social support, Self-monitoring, Feedback,
  Social reward, Prompts/cues, and Behavioral contract are more frequently applied
  in effective physical activity interventions for adolescents.
evidence_level: L1
citations:
- id: 10.1186/s12889-025-25618-4
  locator_quote: Behavioral change techniques applied were similar across effective
    and non-effective interventions, except for Social support, Self-monitoring, Feedback,
    Social reward, Prompts/cues, and Behavioral contract, which were more frequently
    applied in effective interventions.
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Effectiveness and promising behavioral change techniques in interventions
    aimed at promoting physical activity in adolescents: a systematic review'
population_applicability:
  age: "11\u201317"
  sex: mixed
  training_status: general adolescents
  dose_magnitude: N/A
  duration: varied
effect: Interventions incorporating specific behavioral change techniques (Social
  support, Self-monitoring, Feedback, Social reward, Prompts/cues, Behavioral contract)
  are associated with significant positive effects on physical activity behavior.
