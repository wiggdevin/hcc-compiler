id: EA-REC-8071
domain: recovery
claim: 'In offshore sailing, optimal sleep management strategies vary by crew size
  and race duration: for short regattas, ''banking sleep'' beforehand is beneficial,
  while for long races, 4.5-5.5 h of daily sleep, in 30-min to 1-h episodes, is optimal.'
evidence_level: L1
citations:
- id: 10.1007/s40279-025-02389-x
  locator_quote: 'sleep management strategies vary by crew size and race duration:
    for short regattas, "banking sleep" beforehand is beneficial, while for long races,
    4.5-5.5 h of daily sleep, in 30-min to 1-h episodes, is optimal.'
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'Sleep Management and Performance in Offshore Sailing Regattas: A Systematic
    Review'
population_applicability:
  age: adults
  sex: mixed
  training_status: athletes
  dose_magnitude: 4.5-5.5 h daily sleep in 30-60 min episodes
  duration: race duration dependent
effect: Optimizes performance and safety in offshore sailing by mitigating the cognitive
  and psychomotor impairments associated with partial sleep deprivation.
contraindications: []
tier: high-impact
approval: human
