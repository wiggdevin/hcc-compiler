id: EA-REC-7630
domain: recovery
claim: Qigong significantly improves sleep quality in older adults compared to control
  groups, particularly the Baduanjin style.
evidence_level: L1
citations:
- id: 10.3389/fpubh.2025.1664055
  locator_quote: Low certainty of evidence showed that Qigong significantly improved
    sleep quality compared to control groups, as measured by PSQI total score (MD
    = -2.47, 95% CI [-3.09, -1.85], p < 0.001). Substantial heterogeneity was observed
    (I 2 = 82.3%). Subgroup analyses showed that Baduanjin demonstrated significant
    improvement in sleep quality (MD = -2.89, 95% CI [-3.39, -2.39], p < 0.001)
  existence: VERIFIED
  faithfulness: VERIFIED
  cited_title: 'The effects of Qigong exercise on sleep quality in older adults: a
    systematic review and meta-analysis'
population_applicability:
  age: older adults
  sex: mixed
  training_status: unspecified/clinical
  dose_magnitude: unspecified
  duration: unspecified
effect: Significant improvement in sleep quality (PSQI total score reduction of -2.47
  points).
