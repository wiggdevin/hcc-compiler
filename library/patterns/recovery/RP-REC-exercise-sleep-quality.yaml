falsification_signal: High-quality RCTs or updated meta-analyses demonstrating no
  significant difference in PSQI scores or objective polysomnographic sleep metrics
  between exercise or relaxation interventions and active or passive control conditions
  across multiple independent adult populations.
safety_bounds: "Avoid vigorous exercise within 2\u20133 hours of intended sleep onset;\
  \ obtain medical clearance before initiating resistance or aerobic programs in cancer\
  \ patients, frail older adults, or individuals with cardiopulmonary comorbidities;\
  \ rTMS must be administered by a licensed clinician and is contraindicated in individuals\
  \ with implanted metallic devices, cochlear implants, or a personal or family history\
  \ of seizures."
applies_because: "Multiple systematic reviews and meta-analyses consistently report\
  \ significant SMD improvements in subjective sleep quality (range ~0.47\u20131.56\
  \ across modalities), likely mediated by thermoregulatory normalization, hypothalamic-pituitary-adrenal\
  \ axis down-regulation, and circadian rhythm entrainment via timed physical stimulation."
doesnt_apply_if: Acute illness or injury precluding physical activity; currently hospitalized
  patients (evidence base is restricted to non-hospitalized populations); individuals
  with modality-specific contraindications (e.g., rTMS excluded in seizure history
  or metallic implants); severe clinical insomnia requiring pharmacological management
  as primary therapy.
