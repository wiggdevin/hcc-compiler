id: RP-REC-exercise-sleep-quality
domain: recovery
pattern: "Prescribe structured physical activity\u2014prioritizing combined aerobic\
  \ and resistance training\u2014to improve sleep quality in adults, with Tai Chi,\
  \ Qigong, dance, progressive muscle relaxation, or aquatic exercise as evidence-supported\
  \ alternatives tailored to population-specific needs."
parameterization: "Adults \u226550 yr: combined aerobic + resistance training preferred\
  \ (SMD \u22121.56); perinatal women: relaxation exercises 30\u201360 min/session,\
  \ 1\u20132\xD7/week, \u22644 weeks (SMD \u22122.54 to \u22123.13); cancer patients\
  \ on chemotherapy: activity pacing plus progressive muscle relaxation first-line\
  \ (ranked 98.6%), aerobic exercise or walking as alternatives; older adults with\
  \ sleep disturbance or mild cognitive impairment: Tai Chi, Baduanjin-style Qigong\
  \ (PSQI reduction \u22122.47), or rTMS+Tai Chi combination; perimenopausal women\
  \ with insomnia: acupuncture or community-based traditional Chinese exercises as\
  \ adjuncts; general adults: any aerobic, resistance, or mind-body modality scaled\
  \ to baseline sleep impairment severity and intervention duration."
