id: RP-TRA-maximal-strength-low-rep-trained
domain: training
pattern: "Resistance training program for strength in trained adults: low-rep high-load prescriptions of 1-5 reps at 85-100% 1RM across compound movements with 2-4 sessions per week, 3-5 minute inter-set rest, and progressive overload tracked by absolute load."
parameterization: "Resistance-trained adults pursuing strength (1+ year consistent training): 1-5 reps at 85-100% 1RM, 3-6 sets per primary compound lift, 2-4 sessions per week, 3-5 min rest between heavy sets. Powerlifting-style athletes: squat / bench / deadlift centric, 1-3 reps at 90-100% on top sets, accessory work 5-10 reps at 70-85% 1RM. Strength + hypertrophy concurrent (e.g., Carl pattern): pair heavy compound 3-5 reps with hypertrophy accessory work 8-12 reps, total weekly hard sets 12-18 per major muscle. Older trained adults (50+ y): cap top-set intensity at 80-85% 1RM unless under direct supervision; extend warm-up sequence to 3-4 ramp-up sets; recovery 72 h between primary lift exposures. Trained females: same percent-1RM prescriptions; absolute strength progression rate may be slower but relative gains comparable to males in the literature. Strength athletes preparing for competition: peak with 1-3 weeks of higher intensity (90-100% 1RM) at reduced volume, then taper 4-7 days pre-meet."
backing_atom_ids:
  - EA-TRA-3416
  - EA-TRA-2799
  - EA-TRA-1916
  - EA-TRA-5271
  - EA-TRA-3037
falsification_signal: "An RCT (n >= 100, >= 12 weeks) in resistance-trained adults demonstrating that moderate-rep training (8-12 reps at 65-75% 1RM) produces equal or greater maximal strength gains than low-rep high-load training (1-5 reps at 85-100% 1RM) when total weekly volume-load is matched."
safety_bounds: "Require medical clearance before initiating 1-3 rep maximal loads in adults with hypertension, cardiac history, or prior musculoskeletal injury; mandatory spotter or safety pins for back squat / bench press above 85% 1RM; halt session and reassess if technique breakdown occurs on top sets; avoid concurrent maximal strength testing across multiple compound lifts in the same week."
applies_because: "Maximal strength adaptation is mediated by neural drive and motor unit recruitment, which are preferentially stimulated by high-load (>= 85% 1RM) low-rep contractions; resistance-trained adults have the connective tissue and motor control to safely tolerate near-maximal loads and require this intensity stimulus to drive further strength gains beyond the moderate-load hypertrophy zone."
doesnt_apply_if: "Untrained or novice trainees (<6 months consistent training) — prioritize progressive overload at moderate intensities first; acute musculoskeletal injury restricting maximal loading; adults with uncontrolled hypertension or active cardiac pathology; pregnant or recently postpartum trainees without clinical clearance."
tier: high-impact
approval: "Dev Wiggins 2026-05-24"
