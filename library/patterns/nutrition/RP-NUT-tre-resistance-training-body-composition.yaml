id: RP-NUT-tre-resistance-training-body-composition
domain: nutrition
pattern: Combining an 8–10 hour time-restricted eating window with resistance training
  at least 3 days per week reduces fat mass while preserving fat-free mass in physically
  active adults.
parameterization: Early TRE windows (e.g., 8 AM–2 PM) may enhance total body-weight
  reduction versus delayed or ad-libitum windows; protein intake of ≥1.6 g/kg/day
  within the eating window further protects lean mass, escalating to 2.3–3.1 g/kg/day
  during hypocaloric phases in resistance-trained individuals; add a 250–750 kcal/day
  deficit for overweight or obese adults to amplify fat loss; for adults ≥50 years,
  distribute ≥25–30 g leucine-rich protein per meal and treat 1.5 g/kg/day as a minimum
  protein floor; adolescent meal-timing prescriptions must be individualized by weight-status
  phenotype rather than applied universally; menopausal women gain additional quality-of-life
  benefit from the 16:8 variant combined with circuit-style resistance and endurance
  training.
