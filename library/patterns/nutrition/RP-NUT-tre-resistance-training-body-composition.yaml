falsification_signal: An adequately powered RCT demonstrating that TRE+RT produces
  no significant advantage in fat-mass reduction or fat-free mass preservation versus
  protein-matched, isocaloric resistance training alone, or showing that fat-free
  mass is significantly lower with TRE+RT than with RT alone, would disprove this
  pattern.
safety_bounds: Eating window must not be compressed below 6 hours per day; protein
  intake must not drop below 1.2 g/kg/day during any TRE protocol; caloric deficit
  must not exceed 1 000 kcal/day without clinical supervision; individuals with BMI
  ≥40, type 1 diabetes, active eating disorders, or who are pregnant or lactating
  require medical clearance before adopting TRE; adolescents must not follow a TRE
  protocol without individualized guidance.
applies_because: Compressing the eating window reduces total daily energy intake through
  fewer feeding opportunities and attenuated appetite signaling, while concurrent
  resistance training sustains muscle protein synthesis and prevents the fat-free
  mass loss otherwise observed with TRE alone—their combination produced −3.2 ± 0.4
  kg fat mass with stable fat-free mass over 8 weeks versus −1.1 kg fat mass for RT
  alone and fat-free mass loss of −2.3 ± 0.6 kg for TRE alone (EA-NUT-8888), and is
  further reinforced by meta-analytic evidence across multiple TRE-plus-exercise trials
  (EA-NUT-9666, EA-NUT-4384, EA-NUT-6603).
doesnt_apply_if: Active or recovering eating disorders; pregnancy or lactation; type
  1 diabetes or insulin-dependent type 2 diabetes requiring precise carbohydrate timing
  across the day; shift workers with chronic circadian misalignment; adolescents with
  overweight or obesity (meal timing does not modulate post-exercise energy intake
  in this subgroup, EA-NUT-0308); adults with severe sarcopenia or cachexia where
  caloric restriction is contraindicated.
