falsification_signal: "Fat-free mass drops >1%/week over 3 weeks at target intake."
safety_bounds: "Flag renal history before recommending; daily intakes above ~3.1 g/kg/d are not supported by the cited evidence for additional FFM benefit."
applies_because: "Resistance-trained adults in an energy deficit."
doesnt_apply_if: "CKD or other renal contraindication present."
tier: high-impact
approval: "Dev Wiggins 2026-05-22"
version: "0.1.0"
