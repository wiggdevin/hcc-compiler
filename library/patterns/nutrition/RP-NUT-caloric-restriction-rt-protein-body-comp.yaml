id: RP-NUT-caloric-restriction-rt-protein-body-comp
domain: nutrition
pattern: "Combine a structured caloric deficit (250\u2013750 kcal/day) with resistance\
  \ training at least 3 times per week and protein intake of 1.6\u20133.1 g/kg/day\
  \ to maximize fat loss while preserving lean body mass."
parameterization: "Sedentary or untrained healthy adults: 1.6\u20132.0 g/kg/day protein,\
  \ 250\u2013500 kcal/day deficit, moderate-intensity resistance or aerobic exercise.\
  \ Resistance-trained athletes during aggressive cuts: 2.3\u20133.1 g/kg/day protein,\
  \ up to 750 kcal/day deficit, 60\u201380% 1RM resistance training. Older adults\
  \ (\u226560 years): whey protein \u226515 g/day combined with resistance plus multicomponent\
  \ exercise; deficit \u2264500 kcal/day to limit FFM loss. Postmenopausal women:\
  \ 250\u2013750 kcal/day deficit, protein \u22650.8 g/kg/day minimum but 1.6+ g/kg\
  \ preferred for LBM retention. Very-low-energy-diet contexts (\u2264800 kcal/day):\
  \ exercise component is mandatory to mitigate disproportionate FFM loss. Adults\
  \ with prediabetes or T2DM: intermittent fasting formats are interchangeable with\
  \ continuous restriction provided protein and training targets are met; target \u2265\
  5% weight loss for normoglycemia reversion benefit."
