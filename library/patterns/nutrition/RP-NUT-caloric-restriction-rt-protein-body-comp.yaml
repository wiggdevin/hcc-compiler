falsification_signal: "A powered RCT demonstrating that isocaloric caloric restriction\
  \ alone, without elevated protein or resistance training, achieves statistically\
  \ equivalent fat-free mass retention and fat mass loss as the combined protocol\
  \ in the same population over \u226512 weeks."
safety_bounds: "Caloric deficit must not exceed 1,000 kcal/day without clinical supervision\
  \ and body composition monitoring. Protein above 3.5 g/kg/day is not recommended\
  \ without prior renal function screening (eGFR, serum creatinine). Resistance training\
  \ load must be individualized; do not prescribe 60\u201380% 1RM to individuals with\
  \ uncontrolled hypertension, acute musculoskeletal injury, or recent cardiac event\
  \ without medical clearance."
applies_because: Caloric restriction alone induces negative nitrogen balance and upregulates
  muscle-protein catabolism, while resistance training activates mTOR-mediated myofibrillar
  synthesis and high protein intake saturates muscle fractional synthetic rate, together
  creating a net anabolic intramuscular environment that counteracts the catabolic
  energy deficit.
doesnt_apply_if: "CKD stages 3\u20135 or dialysis patients (protein restriction required);\
  \ absolute contraindications to resistance exercise (acute MI within 6 weeks, unstable\
  \ angina, severe aortic stenosis, acute musculoskeletal injury); pediatric or adolescent\
  \ populations with obesity (altered REE response to restriction); individuals on\
  \ incretin-based pharmacotherapy who must be monitored separately for disproportionate\
  \ FFM loss exceeding 25\u201339% of total weight loss; protein timing flexibility\
  \ applies \u2014 pre- vs. post-exercise distribution does not materially alter outcomes."
