# Tag curation diff — 2026-05-23
# Purpose: correct mis-tagged population_applicability fields that depress
# pop_match scores for trained/young intake personas (Carl, Tori, Sarah).
#
# Each entry retags ONE field of ONE atom. Reversible via
# scripts/apply_curation.py --undo.
#
# Hard cap: 25 entries (PRD §2.1, no-i-want-everything-piped-bear.md).
# This diff: 17 entries.
#
# Two failure modes addressed:
#
# 1. SCORE-AFFECTING (tier 1+2, 4 entries):
#    training_status holds a mixed-cohort phrase ("trained and untrained",
#    "untrained to moderately trained", "trained or untrained") OR plain
#    "untrained" when the claim text does not actually describe an untrained
#    cohort. score.py's _TRAINING_KEYWORD_MAP lists "untrained" before the
#    mixed phrases, so any substring containing "untrained" normalizes to
#    "untrained" rank — depressing pop_match for trained intakes (Carl) by
#    ~0.24 per atom.
#
# 2. DATA-QUALITY CLEANUP (tier 3, 13 entries):
#    training_status field holds an AGE-POPULATION or CLINICAL label
#    (e.g. "older adults", "sarcopenic older adults", "community-dwelling
#    older adults", "Sarcopenic obesity"). score.py currently keyword-maps
#    these to "any", so the live score is unchanged. But the raw tag is
#    semantically wrong (it's an age/clinical descriptor, not a training
#    rank) and fragile against future normalizer edits. Retagging to "any"
#    matches the existing effective behavior and removes the silent bug.

- atom_id: EA-NUT-4009
  field: population_applicability.training_status
  old: "untrained"
  new: "any"
  reason: "tag 'untrained' but claim is a network meta-analysis of older adults across regimens; training status not actually specified by the source"

